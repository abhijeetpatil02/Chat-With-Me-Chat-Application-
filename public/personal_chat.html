<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ChatWithMe - Private Chat</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6b73ff">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f0f2f5;
            --chat-bg: #ffffff;
            --me-bubble: #6c5ce7;
            --other-bubble: #f1f2f6;
            --text-main: #2d3436;
            --text-secondary: #636e72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            /* overflow: hidden; */
            background-color: var(--bg-color);
        }

        body {
            position: relative;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 15px;
            padding-top: calc(10px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            box-shadow: 0 1px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 2000;

            /*changed by me */
            height: 70px;
            flex-shrink: 0;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 24px;
            margin-right: 15px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 4px 8px rgba(108, 92, 231, 0.2);
        }

        .user-details h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .user-details span {
            font-size: 12px;
            color: #00b894;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .action-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fd;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
            color: var(--text-secondary);
        }

        /* Chat Area */
        #chatBox {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fd;
            background-image: radial-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 0;
            scroll-behavior: smooth;
            padding-bottom: 90px;
            position: relative;
            z-index: 1;
            /* height of input bar */
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .msg-wrapper.me {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg-wrapper.other {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            word-wrap: break-word;
            max-width: 100%;
        }

        .msg-bubble img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
            display: block;
        }

        .msg-bubble a {
            color: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: underline;
        }

        .me .msg-bubble {
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .other .msg-bubble {
            background: white;
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid #edf2f7;
        }

        .msg-time {
            font-size: 10px;
            margin-top: 4px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Input Area */
        .input-area {
            background: white;
            padding: 8px 10px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.03);
            z-index: 1000;
            flex-shrink: 0;
            min-height: 70px;
            position: fixed;
            /*i changed here */
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: auto;
        }

        .input-wrapper {
            flex: 1;
            background: #f1f2f6;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
            border: 1px solid #edf2f7;
            min-width: 0;
        }

        #message {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 14px;
            outline: none;
            color: var(--text-main);
            min-width: 0;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            max-height: 80px;
            overflow-y: auto;
        }

        .btn-input {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 22px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-send {
            width: 46px;
            height: 46px;
            flex-shrink: 0;
            border-radius: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        /* Emoji Picker */
        #emojiPicker {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            z-index: 1000;
            border: 1px solid #edf2f7;
            max-height: 200px;
            overflow-y: auto;
        }

        #emojiPicker span {
            font-size: 24px;
            cursor: pointer;
            text-align: center;
        }

        /* Video/Call Modals - same as before */
        #videoContainer {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a1a1a;
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: black;
        }

        #localVideo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 140px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 10001;
        }

        .video-controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 10002;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hangup-btn {
            background: #ff4757;
        }

        .btn-off {
            background: rgba(255, 71, 87, 0.6) !important;
        }

        .call-status {
            position: absolute;
            top: 40px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 10002;
            animation: pulse-opacity 1.5s infinite;
        }

        @keyframes pulse-opacity {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .incoming-call-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 11000;
            align-items: center;
            justify-content: center;
        }

        .incoming-call-content {
            background: white;
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            width: 85%;
            max-width: 320px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .caller-avatar {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 20px;
        }

        .incoming-call-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .accept-btn,
        .reject-btn {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }

        .accept-btn {
            background: #2ed573;
        }

        .reject-btn {
            background: #ff4757;
        }

        .recording-active {
            color: #ff7675 !important;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        @media (max-width: 480px) {
            .msg-wrapper {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="Chats.html" class="back-btn">←</a>
        <div class="user-info">
            <div class="avatar" id="userAvatar">?</div>

        <div class="header-actions">

    <div id="emojiPicker">

        <span onclick="addEmoji('😆')">😆</span><span onclick="addEmoji('😅')">😅</span><span

        <span onclick="addEmoji('😘')">😘</span><span onclick="addEmoji('😋')">😋</span><span

        <span onclick="addEmoji('🤪')">🤪</span><span onclick="addEmoji('😎')">😎</span><span
            onclick="addEmoji('😏')">😏</span><span onclick="addEmoji('🥳')">🥳</span>
        <span onclick="addEmoji('👍')">👍</span><span onclick="addEmoji('❤️')">❤️</span><span

    <div class="input-area">
        <button class="btn-input" onclick="toggleEmojiPicker()">😀</button>
        <button class="btn-input" id="recordBtn" onclick="toggleRecording()">🎤</button>
        <div class="input-wrapper">
            <input type="text" id="message" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button class="btn-input" title="Attach File"
                onclick="document.getElementById('fileInput').click()">📎</button>

        <button class="btn-send" onclick="sendMessage()">🚀</button>

    <!-- Video Call UI -->
    <div id="videoContainer">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="video-controls">
            <button class="control-btn toggle-mic" onclick="toggleMic()">🎤</button>
            <button class="control-btn toggle-video" onclick="toggleVideo()">📹</button>
            <button class="control-btn hangup-btn" onclick="endVideoCall()">📞</button>
        </div>
        <div id="callStatus" class="call-status">Connecting...</div>
    </div>

    <!-- Incoming Call Modal -->
    <div id="incomingCallModal" class="incoming-call-modal">
        <div class="incoming-call-content">
            <div class="caller-avatar" id="callerAvatar">?</div>
            <h3 id="callerName">Incoming Call...</h3>

                <button class="accept-btn" onclick="acceptCall()">Accept</button>

        </div>
    </div>
    <audio id="outgoingRing" loop>
        <source src="/sounds/dial_tone.mp3" type="audio/mpeg">
    </audio>

    <audio id="incomingRing" loop>
        <source src="/sounds/iphone.mp3" type="audio/mpeg">
    </audio>


    <script src="/socket.io/socket.io.js"></script>
    <script src="/notifications.js"></script>
    <script>
        window.socket = io();
        const socket = window.socket;

        const urlParams = new URLSearchParams(window.location.search);
        const contactName = urlParams.get('user') || 'Contact';
        const contactEmail = urlParams.get('email');

        document.getElementById('chatHeader').innerText = contactName;
        document.getElementById('userAvatar').innerText = contactName.charAt(0).toUpperCase();

        let myEmail = "";
        let myUsername = "";
        let roomId = "";
        let localStream = null;
        let peerConnection = null;
        let incomingCallData = null;
        let currentCallType = "video";
        let pendingCandidates = [];

        const servers = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                {
                    urls: "stun:stun.relay.metered.ca:80",
                },
                {
                    urls: "turn:global.relay.metered.ca:80",
                    username: "75097e4b788e515576a70792",
                    credential: "+CTIVLDz0Dmv2B3+",
                },
                {
                    urls: "turn:global.relay.metered.ca:80?transport=tcp",
                    username: "75097e4b788e515576a70792",
                    credential: "+CTIVLDz0Dmv2B3+",
                },
                {
                    urls: "turn:global.relay.metered.ca:443",
                    username: "75097e4b788e515576a70792",
                    credential: "+CTIVLDz0Dmv2B3+",
                },
                {
                    urls: "turns:global.relay.metered.ca:443?transport=tcp",
                    username: "75097e4b788e515576a70792",
                    credential: "+CTIVLDz0Dmv2B3+",
                },
            ]
        };

        fetch('/api/me')
            .then(async res => {
                if (res.status === 401) {
                    const savedUser = localStorage.getItem("chatUser");
                    const savedPass = localStorage.getItem("chatPass");
                    if (savedUser && savedPass) {
                        try {
                            const loginRes = await fetch("/Login", {
                                method: "POST",
                                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                                body: new URLSearchParams({ email_id: savedUser, Passwords: atob(savedPass) })
                            });
                            if (loginRes.ok && !loginRes.url.includes("login_error")) {
                                location.reload();
                                return;
                            }
                        } catch (e) {
                            console.error("Auto-login failed", e);
                        }
                    }
                    localStorage.removeItem("chatUser");
                    localStorage.removeItem("chatPass");
                    window.location.href = '/login';
                    return;
                }
                return res.json();
            })
            .then(user => {
                if (!user) return; // Stop if no user data

                myEmail = user.email.toLowerCase();
                myUsername = user.username;

                // Ensure roomId is created so socket knows where to listen
                if (contactEmail) {
                    roomId = [myEmail, contactEmail.toLowerCase()].sort().join('_');
                    socket.emit('join room', { room_id: roomId });
                }
            })
            .catch(err => console.error("Identity fetch failed:", err));
        /* ===========================
           CHAT FUNCTIONS
        =========================== */

        function sendMessage() {
            const input = document.getElementById("message");
            const text = input.value.trim();

            if (!text || !roomId) return;

            const msgData = {
                room_id: roomId,
                sender_email: myEmail,
                username: myUsername,
                text: text
            };

            socket.emit("chat message", msgData);
            renderMessage({ ...msgData, timestamp: new Date().toISOString() }, true);

            input.value = "";
        }

        function handleKeyPress(e) {
            if (e.key === "Enter") sendMessage();
        }

        // socket.on("chat history", (history) => {
        //     const box = document.getElementById("chatBox");
        //     box.innerHTML = "";
        //     history.forEach(msg => renderMessage(msg));
        // });
        socket.on("chat history", (history) => {
            const box = document.getElementById("chatBox");

            // Clear old messages
            box.innerHTML = "";

            // Render each old message
            history.forEach(msg => renderMessage(msg));

            // Auto scroll to latest message
            box.scrollTop = box.scrollHeight;
        });

        socket.on("chat message", (data) => {
            if (data.sender_email !== myEmail) {
                renderMessage(data);
            }
        });

        function renderMessage(data, isMe = false) {
            const box = document.getElementById("chatBox");
            const side = (isMe || data.sender_email === myEmail) ? "me" : "other";

            const wrapper = document.createElement("div");
            wrapper.className = `msg-wrapper ${side}`;

            const time = data.timestamp
                ? new Date(data.timestamp).toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                })
                : "Now";

            wrapper.innerHTML = `
        <div class="msg-bubble">${data.text}</div>
        <div class="msg-time">${time}</div>
    `;

            box.appendChild(wrapper);
            box.scrollTop = box.scrollHeight;
        }

        /* ===========================
           FILE SHARING
        =========================== */

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (e) {
                let content = "";

                if (file.type.startsWith("image/")) {
                    content = `<img src="${e.target.result}" alt="${file.name}">`;
                } else {
                    content = `<a href="${e.target.result}" download="${file.name}">📄 ${file.name}</a>`;
                }

                const msgData = {
                    room_id: roomId,
                    sender_email: myEmail,
                    username: myUsername,
                    text: content
                };

                socket.emit("chat message", msgData);
                renderMessage({ ...msgData, timestamp: new Date().toISOString() }, true);
            };

            // reader.readAsDataURL(file);
            reader.readAsDataURL(file);
            event.target.value = "";
        }

        /* ===========================
           EMOJI
        =========================== */

        function toggleEmojiPicker() {
            const picker = document.getElementById("emojiPicker");
            picker.style.display = picker.style.display === "grid" ? "none" : "grid";
        }

        // function addEmoji(emoji) {
        //     document.getElementById("message").value += emoji;
        // }
        function addEmoji(emoji) {
            document.getElementById("message").value += emoji;
            document.getElementById("emojiPicker").style.display = "none";
        }

        /* ===========================
           WEBRTC
        =========================== */

        function createPeerConnection(targetEmail) {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            peerConnection = new RTCPeerConnection(servers);

            peerConnection.ontrack = (event) => {
                console.log("Remote track received:", event.track.kind);
                const remoteVideo = document.getElementById("remoteVideo");

                // Assign stream safely
                if (event.streams && event.streams[0]) {
                    if (remoteVideo.srcObject !== event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                    }
                } else {
                    if (!remoteVideo.srcObject) {
                        remoteVideo.srcObject = new MediaStream();
                    }
                    remoteVideo.srcObject.addTrack(event.track);
                }

                // Force play on every new track to ensure mobile browsers render it
                setTimeout(() => {
                    remoteVideo.play().catch(err => {
                        console.warn("Autoplay error:", err);
                    });
                }, 100);

                document.getElementById("callStatus").innerText = "Connected";
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("ice-candidate", {
                        to: targetEmail,
                        candidate: event.candidate
                    });
                }
            };

            // Add local tracks to the connection
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }

            peerConnection.oniceconnectionstatechange = () => {
                console.log("ICE State:", peerConnection.iceConnectionState);

                if (
                    peerConnection.iceConnectionState === "failed" ||
                    peerConnection.iceConnectionState === "closed"
                ) {
                    endVideoCall(false);
                }
            };
        }
        async function startCall(withVideo) {
            try {
                currentCallType = withVideo ? "video" : "audio";

                document.getElementById("videoContainer").style.display = "flex";
                document.getElementById("callStatus").innerText = "Calling...";

                playOutgoingRing();

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: withVideo,
                    audio: true
                });
            } catch (mediaErr) {
                console.warn("Failed to get video/audio, trying audio only", mediaErr);
                if (withVideo) {
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                        withVideo = false; // Downgrade to audio
                        alert("Camera not accessible. Downgraded to audio-only call.");
                    } catch (audioErr) {
                        throw audioErr;
                    }
                } else {
                    throw mediaErr;
                }
            }

            if (withVideo) {
                    localStream.getVideoTracks().forEach(track => {
                        track.enabled = true;
                    });
                }



                document.getElementById("localVideo").srcObject = localStream;
                // document.getElementById("localVideo").style.display = withVideo ? "block" : "none";
                document.getElementById("localVideo").style.display = withVideo ? "block" : "none";
                document.getElementById("remoteVideo").style.display = "block";

                createPeerConnection(contactEmail);

                const offer = await peerConnection.createOffer({
                    offerToReceiveVideo: true,
                    offerToReceiveAudio: true
                });
                await peerConnection.setLocalDescription(offer);

                socket.emit("call-user", {
                    to: contactEmail,
                    from: myEmail,
                    name: myUsername,
                    offer,
                    type: currentCallType
                });

            } catch (err) {
                console.error(err);
                alert("Microphone/Camera access denied");
                endVideoCall();
            }
        }

        function startVideoCall() {
            startCall(true);
        }

        function startAudioCall() {
            startCall(false);
        }

        socket.on("video-offer", (data) => {
            // Check if we are already in a call
            if (peerConnection || localStream) {
                if (incomingCallData && incomingCallData.from === data.from) return; // Ignore duplicate offer for same call
                socket.emit("reject-call", { to: data.from });
                return;
            }
            incomingCallData = data;
            
            // Tell the server we received the offer so it stops sending push notifications
            socket.emit("ringing", { from: data.from });
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('acceptCall') === 'true') {
                acceptCall();
                // Remove parameter so it doesn't auto-answer subsequent calls on refresh
                window.history.replaceState({}, document.title, window.location.pathname + "?user=" + urlParams.get('user') + "&email=" + urlParams.get('email'));
                return;
            }

            document.getElementById("callerName").innerText = `${data.name} is calling...`;
            document.getElementById("callerAvatar").innerText = data.name.charAt(0).toUpperCase();
            document.getElementById("incomingCallModal").style.display = "flex";
            document.getElementById("remoteVideo").setAttribute("playsinline", true);
            document.getElementById("remoteVideo").play().catch(() => { });

            playIncomingRing();
        });

        async function acceptCall() {
            if (!incomingCallData) return;

            stopIncomingRing();

            const isVideo = incomingCallData.type !== "audio";

            document.getElementById("incomingCallModal").style.display = "none";
            document.getElementById("videoContainer").style.display = "flex";

            try {
                let streamPromise = navigator.mediaDevices.getUserMedia({
                    video: isVideo,
                    audio: true
                }).catch(async (err) => {
                    console.warn("Failed with video, trying audio only", err);
                    if (isVideo) {
                        return navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                    }
                    throw err;
                });
                
                // Fallback to manual accept if camera is blocked or requires explicit gesture
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 5000));
                localStream = await Promise.race([streamPromise, timeoutPromise]);

                if (localStream.getVideoTracks().length > 0) {
                    localStream.getVideoTracks().forEach(track => {
                        track.enabled = true;
                    });
                }

                document.getElementById("localVideo").srcObject = localStream;
                document.getElementById("localVideo").style.display = isVideo ? "block" : "none";
                document.getElementById("remoteVideo").style.display = "block";

                createPeerConnection(incomingCallData.from);

                await peerConnection.setRemoteDescription(
                    new RTCSessionDescription(incomingCallData.offer)
                );

                // Add pending ICE candidates
                for (const candidate of pendingCandidates) {
                    await peerConnection.addIceCandidate(
                        new RTCIceCandidate(candidate)
                    );
                }
                pendingCandidates = [];

                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                socket.emit("make-answer", {
                    to: incomingCallData.from,
                    answer
                });

            } catch (err) {
                console.error("Accept call error:", err);
                if (err.message === "Timeout" || err.name === "NotAllowedError") {
                    // Browser blocked auto-answer. Re-show the modal for manual explicit interaction!
                    document.getElementById("videoContainer").style.display = "none";
                    document.getElementById("incomingCallModal").style.display = "flex";
                } else {
                    alert("Failed to access camera/microphone: " + err.message);
                    endVideoCall();
                }
            }
        }
        function rejectCall() {
            stopIncomingRing();

            socket.emit("reject-call", {
                to: incomingCallData.from
            });

            document.getElementById("incomingCallModal").style.display = "none";
            incomingCallData = null;
        }

        socket.on("video-answer", async (data) => {
            await peerConnection.setRemoteDescription(
                new RTCSessionDescription(data.answer)
            );

            for (const candidate of pendingCandidates) {
                await peerConnection.addIceCandidate(
                    new RTCIceCandidate(candidate)
                );
            }

            pendingCandidates = [];

            // Do NOT call .load() on MediaStreams, it breaks mobile WebRTC!

            stopOutgoingRing();
            document.getElementById("callStatus").innerText = "Connected";
        });
        socket.on("ice-candidate", async (data) => {
            try {
                if (peerConnection && peerConnection.remoteDescription) {
                    await peerConnection.addIceCandidate(
                        new RTCIceCandidate(data.candidate)
                    );
                } else {
                    pendingCandidates.push(data.candidate);
                }
            } catch (err) {
                console.error("ICE candidate error:", err);
            }
        });

        socket.on("call-rejected", (data) => {
            endVideoCall();
        });

        socket.on("video-hangup", () => {
            endVideoCall(false);
        });

        function endVideoCall(sendSignal = true) {
            stopOutgoingRing();
            stopIncomingRing();

            pendingCandidates = []; // Clear pending candidates

            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            document.getElementById("localVideo").srcObject = null;
            document.getElementById("remoteVideo").srcObject = null;

            document.getElementById("videoContainer").style.display = "none";
            document.getElementById("incomingCallModal").style.display = "none";

            if (sendSignal && contactEmail) {
                socket.emit("hangup", { to: contactEmail });
            }
        }

        // Auto-answer logic from URL
        window.addEventListener('load', () => {
            if (contactEmail) {
                socket.emit('request-offer', { from: contactEmail });
            }
        });

        /* ===========================
           CONTROLS
        =========================== */

        function toggleMic() {
            if (!localStream) return;

            const track = localStream.getAudioTracks()[0];
            if (!track) return;

            track.enabled = !track.enabled;

            document.querySelector(".toggle-mic")
                .classList.toggle("btn-off", !track.enabled);
        }

        function toggleVideo() {
            if (!localStream) return;

            const track = localStream.getVideoTracks()[0];
            if (!track) return;

            track.enabled = !track.enabled;

            document.querySelector(".toggle-video")
                .classList.toggle("btn-off", !track.enabled);
        }

        /* ===========================
           AUDIO
        =========================== */

        function playOutgoingRing() {
            const audio = document.getElementById("outgoingRing");
            audio.currentTime = 0;
            audio.play().catch(() => { });
        }

        function stopOutgoingRing() {
            const audio = document.getElementById("outgoingRing");
            audio.pause();
            audio.currentTime = 0;
        }

        function playIncomingRing() {
            const audio = document.getElementById("incomingRing");
            const RINGTONES = {
                'iphone': '/sounds/iphone.mp3',
                'classic': '/sounds/classic.mp3',
                'modern': '/sounds/modern.mp3'
            };
            const savedRing = localStorage.getItem('cwm_ringtone') || 'iphone';
            const targetSrc = RINGTONES[savedRing];
            const sourceEl = audio.querySelector('source');
            
            if (sourceEl.src !== targetSrc) {
                sourceEl.src = targetSrc;
                audio.load();
            }
            
            audio.currentTime = 0;
            audio.play().catch(() => { });
        }

        function stopIncomingRing() {
            const audio = document.getElementById("incomingRing");
            audio.pause();
            audio.currentTime = 0;
        }
        window.addEventListener("beforeunload", () => {
            stopOutgoingRing();
            stopIncomingRing();
            endVideoCall(true);
        });


        function openUserInfo() {
            alert(`Name: ${contactName}\nEmail: ${contactEmail}`);
        }

        async function removeFriend() {
            if (confirm(`Are you sure you want to remove ${contactName} from your friends?`)) {
                try {
                    const res = await fetch('/api/remove-friend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ friend_email: contactEmail, friend_name: contactName })
                    });

                    if (res.ok) {
                        window.location.href = 'Chats.html';
                    } else {
                        alert("Failed to remove friend.");
                    }
                } catch (err) {
                    alert("Operation failed. Try again.");
                }
            }
        }

        function fixViewport() {
            document.body.style.height = window.innerHeight + "px";
        }

        window.addEventListener("resize", fixViewport);
        window.addEventListener("load", fixViewport);

        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", () => {
                document.body.style.height = window.visualViewport.height + "px";
            });
        }

        /* ===========================
           VOICE RECORDING
        =========================== */
        let mediaRecorder;
        let audioChunks = [];

        async function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            if (btn.classList.contains('recording-active')) {
                mediaRecorder.stop();
                btn.classList.remove('recording-active');
                btn.style.color = "";
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.start();

                    btn.classList.add('recording-active');
                    btn.style.color = "red";

                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            const audioHtml = `<audio controls src="${reader.result}" style="width: 200px; height: 30px;"></audio>`;
                            const msgData = {
                                room_id: roomId,
                                sender_email: myEmail,
                                username: myUsername,
                                text: audioHtml
                            };
                            socket.emit("chat message", msgData);
                            renderMessage({ ...msgData, timestamp: new Date().toISOString() }, true);
                        };
                        audioChunks = [];
                        stream.getTracks().forEach(track => track.stop());
                    };
                } catch (err) {
                    alert("Mic access denied");
                }
            }
        }
    </script>
