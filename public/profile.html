<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatWithMe - My Profile</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6b73ff">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #2d3436;
            --text-secondary: #636e72;
            --accent-color: #6c5ce7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f8f9fd;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-header {
            height: 160px;
            background: var(--primary-gradient);
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.2);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        .avatar-wrapper {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px;
            background: white;
            border-radius: 35%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .avatar-main {
            width: 100px;
            height: 100px;
            border-radius: 30%;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .profile-body {
            padding: 70px 30px 40px;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .email-tag {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            display: block;
        }

        .info-card {
            background: #f8f9fd;
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            margin-bottom: 30px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .btn {
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-outline {
            background: white;
            border: 1.5px solid #edf2f7;
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: #f8f9fd;
            border-color: #cbd5e0;
        }

        .btn-logout {
            color: #f56565;
            border-color: #fed7d7;
        }

        .btn-logout:hover {
            background: #fff5f5;
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <div class="profile-header">
            <a href="homepage.html" class="back-btn">←</a>
            <div class="avatar-wrapper">
                <div class="avatar-main" id="userAvatar">?</div>
            </div>
        </div>

        <div class="profile-body">
            <h1 id="userName">User Name</h1>
            <span class="email-tag" id="userEmail">user@example.com</span>

            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">Full Name</span>
                    <span class="info-value" id="valName">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Account Level</span>
                    <span class="info-value">Verified User</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Member Since</span>
                    <span class="info-value">April 2026</span>
                </div>
            </div>

            <div class="action-btns">
                <a href="homepage.html" class="btn btn-primary">Back to Discover</a>
                <a href="Chats.html" class="btn btn-outline">My Friends List</a>
                <a href="/logout" class="btn btn-outline btn-logout">Logout Account</a>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>window.socket = io(); const socket = window.socket;</script>
    <script src="/notifications.js"></script>
    <script>
        window.onload = async function () {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('userName').innerText = user.username;
                    document.getElementById('userEmail').innerText = user.email;
                    document.getElementById('valName').innerText = user.username;
                    document.getElementById('userAvatar').innerText = user.username.charAt(0).toUpperCase();
                } else if (res.status === 401) {
                    const savedUser = localStorage.getItem("chatUser");
                    const savedPass = localStorage.getItem("chatPass");
                    if (savedUser && savedPass) {
                        try {
                            const loginRes = await fetch("/Login", {
                                method: "POST",
                                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                                body: new URLSearchParams({ email_id: savedUser, Passwords: atob(savedPass) })
                            });
                            if (loginRes.ok && !loginRes.url.includes("login_error")) {
                                location.reload();
                                return;
                            }
                        } catch (e) {
                            console.error("Auto-login failed", e);
                        }
                    }
                    localStorage.removeItem("chatUser");
                    localStorage.removeItem("chatPass");
                    window.location.href = '/login';
                }
            } catch (err) {
                console.error("Profile load error:", err);
            }
        };
    </script>
</body>

</html>
