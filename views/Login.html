<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatWithMe - Login</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6b73ff">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #6b73ff;
            --secondary-color: #000dff;
            --text-color: #333;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            overflow: hidden;
        }

        /* Animated background shapes */
        .shape {
            position: absolute;
            filter: blur(50px);
            z-index: -1;
            border-radius: 50%;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: rgba(107, 115, 255, 0.4);
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: rgba(118, 75, 162, 0.4);
            bottom: -150px;
            right: -150px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1s ease-out;
            box-sizing: border-box;
        }

        h2 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .forgot {
            display: flex;
            justify-content: flex-end;
            margin-top: -15px;
            margin-bottom: 25px;
        }

        .forgot a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s ease;
        }

        .forgot a:hover {
            color: #fff;
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: var(--primary-color);
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.9);
        }

        button:active {
            transform: translateY(0);
        }

        p {
            margin-top: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        p a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        p a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 0 20px;
            }
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-container">
        <form action="/login" method="POST">
            <h2>Welcome Back</h2>
            <div class="input-group">
                <label for="username">Email Address</label>
                <input type="email" id="username" name="email_id" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="Passwords" placeholder="Enter your password" required>
            </div>
            <div class="forgot">
                <a href="/forgot.html">Forgot Password?</a>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <p>Don't have an account? <a href="/signup">Create Account</a></p>
    </div>

    <!-- <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("Service Worker Registered"));
        }
    </script> -->
    <!-- Add this script before </body> -->
    <script>
        // If user already logged in, skip login page
        const savedUser = localStorage.getItem("chatUser");

        if (savedUser) {
            window.location.href = "/homepage.html";
        }

        // Replace your current form submit script with this:
        // REPLACE your current login success block with this improved version

        document.querySelector("form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const emailInput = document.getElementById("username").value;
            const email = emailInput ? emailInput.trim().toLowerCase() : "";
            const password = document.getElementById("password").value;

            if (!email || !password) {
                alert("Please enter both email and password");
                return;
            }

            try {
                const response = await fetch("/Login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        email_id: email,
                        Passwords: password
                    }),
                    credentials: "same-origin"
                });

                if (response.ok) {
                    // Check if the server redirected us to an error page
                    if (response.url.includes("login_error")) {
                        alert("Invalid email or password");
                        return;
                    }

                    // Save user session in localStorage for immediate frontend checks
                    localStorage.setItem("chatUser", email);
                    localStorage.setItem("chatPass", btoa(password));

                    // Redirect properly
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        window.location.href = "/homepage.html";
                    }
                } else {
                    const errorText = await response.text();
                    if (errorText.includes("Invalid")) {
                        alert("Invalid email or password");
                    } else {
                        alert("Login failed. Server error.");
                    }
                }

            } catch (error) {
                alert("Login failed. Please check your connection.");
                console.error("Login Fetch Error:", error);
            }
        });
        // Register Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("Service Worker Registered"));
        }
    </script>
</body>

</html>
