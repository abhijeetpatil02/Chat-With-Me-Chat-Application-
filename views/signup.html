<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatWithMe - Create Account</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6b73ff">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #6b73ff;
            --secondary-color: #000dff;
            --text-color: #333;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            filter: blur(50px);
            z-index: -1;
            border-radius: 50%;
        }
        .shape-1 { width: 300px; height: 300px; background: rgba(107, 115, 255, 0.4); top: -100px; left: -100px; }
        .shape-2 { width: 400px; height: 400px; background: rgba(118, 75, 162, 0.4); bottom: -150px; right: -150px; }

        .signup-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1s ease-out;
            box-sizing: border-box;
        }

        h2 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: var(--primary-color);
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.9);
        }

        button:active {
            transform: translateY(0);
        }

        p {
            margin-top: 25px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        p a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        p a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 30px 20px;
                margin: 0 20px;
            }
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="signup-container">
        <form id="signupForm" action="/handleform" method="POST">
            <h2>Join Us</h2>
            <div class="input-group">
                <label for="name">Username</label>
                <input type="text" id="name" name="UserName" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email_id" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="Passwords" placeholder="Create a password" required>
            </div>

            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="/login">Sign In</a></p>
        </form>
    </div>

    <script>
        document.getElementById("signupForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const username = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            try {
                const res = await fetch("/handleform", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ UserName: username, email_id: email, Passwords: password })
                });
                
                if (res.ok && !res.url.includes("login_error")) {
                    localStorage.setItem("chatUser", email.toLowerCase());
                    localStorage.setItem("chatPass", btoa(password));
                    window.location.href = "/homepage.html";
                } else {
                    alert("Signup failed. Email might already exist.");
                }
            } catch (err) {
                alert("Signup failed. Please try again.");
            }
        });
    </script>
</body>

</html>
